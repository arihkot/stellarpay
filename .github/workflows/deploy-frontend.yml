name: Deploy Frontend

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - run: npm ci

      - name: Build
        run: npm run build
        env:
          VITE_PUBLIC_CONTRACT_ID: ${{ secrets.PUBLIC_CONTRACT_ID }}
          VITE_PUBLIC_RPC_URL: ${{ secrets.PUBLIC_RPC_URL || 'https://soroban-testnet.stellar.org' }}
          VITE_PUBLIC_NETWORK_PASSPHRASE: ${{ secrets.PUBLIC_NETWORK_PASSPHRASE || 'Test SDF Network ; September 2015' }}
          VITE_PUBLIC_HORIZON_URL: ${{ secrets.PUBLIC_HORIZON_URL || 'https://horizon-testnet.stellar.org' }}
          VITE_PUBLIC_ANCHOR_HOME_DOMAIN: ${{ secrets.PUBLIC_ANCHOR_HOME_DOMAIN || 'https://testanchor.stellar.org' }}

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: frontend
          command: pages deploy dist --project-name=stellarpay
